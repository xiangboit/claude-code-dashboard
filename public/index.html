<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: #1e1e1e;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #333;
        }

        .sidebar h2 {
            font-size: 14px;
            color: #ccc;
            font-weight: 500;
        }

        .project-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .project-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            position: relative;
            transition: background 0.15s;
        }

        .project-item:hover {
            background: #2a2a2a;
        }

        .project-item.active {
            background: #2a4a6a;
        }

        .project-name {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .project-desc {
            font-size: 11px;
            color: #888;
        }

        .clone-area {
            padding: 8px;
            border-top: 1px solid #333;
        }

        .clone-input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px 10px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .clone-input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        .clone-input::placeholder {
            color: #666;
        }

        .clone-status {
            font-size: 11px;
            padding: 4px 0;
            min-height: 18px;
        }

        /* 主区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 44px;
        }

        .header-left h1 {
            font-size: 14px;
            font-weight: 500;
        }

        .header-left .project-path {
            font-size: 11px;
            color: #666;
        }

        .reconnect-btn {
            background: none;
            color: #4a90e2;
            border: 1px solid #4a90e2;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }

        .reconnect-btn:hover {
            background: #4a90e2;
            color: #fff;
        }

        /* 终端和空状态 */
        .terminal-wrapper {
            flex: 1;
            overflow: hidden;
            display: none;
        }

        .terminal-wrapper.active {
            display: block;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 14px;
        }

        .empty-state.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Projects</h2>
        </div>
        <div class="project-list" id="projectList"></div>
        <div class="clone-area">
            <input class="clone-input" id="cloneInput" placeholder="粘贴 git 地址，回车 clone" onkeydown="if(event.key==='Enter')cloneRepo()">
            <div class="clone-status" id="cloneStatus"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <h1 id="projectTitle">Claude Code Dashboard</h1>
                <div class="project-path" id="headerProjectPath"></div>
            </div>
            <button class="reconnect-btn" id="reconnectBtn" onclick="reconnect()">重新连接</button>
        </div>

        <div class="empty-state" id="emptyState">选择一个项目启动 Claude Code</div>

        <div class="terminal-wrapper" id="terminalWrapper">
            <div id="terminal"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="app.js"></script>
</body>
</html>
